<div id="Lesson1-sortableTrash" class="sortable-code"></div> 
<div id="Lesson1-sortable" class="sortable-code"></div> 
<div style="clear:both;"></div> 
<p> 
    <input id="Lesson1-feedbackLink" value="Get Feedback" type="button" /> 
    <input id="Lesson1-newInstanceLink" value="Reset Problem" type="button" /> 
</p> 
<script type="text/javascript"> 
(function(){
  var initial = "# Hello World program
\n" +
    "# Subprograms
\n" +
    "def output():
\n" +
    "    print(&quot;Hello World&quot;)
\n" +
    "    print(&quot;Computer Science is FUN&quot;)
\n" +
    "# Main program
\n" +
    "output()
\n" +
    "OUTPUT Computer Science is FUN
\n" +
    "#distractor
\n" +
    "    print(Hello World)#distractor";
  var parsonsPuzzle = new ParsonsWidget({
    "sortableId": "Lesson1-sortable",
    "max_wrong_lines": 10,
    "grader": ParsonsWidget._graders.LineBasedGrader,
    "exec_limit": 2500,
    "can_indent": true,
    "x_indent": 50,
    "lang": "en",
    "show_feedback": true,
    "python3": true,
    "trashId": "Lesson1-sortableTrash"
  });
  parsonsPuzzle.init(initial);
  parsonsPuzzle.shuffleLines();
  $("#Lesson1-newInstanceLink").click(function(event){ 
      event.preventDefault(); 
      parsonsPuzzle.shuffleLines(); 
  }); 
  $("#Lesson1-feedbackLink").click(function(event){ 
      event.preventDefault(); 
      parsonsPuzzle.getFeedback(); 
  }); 
})(); 
</script>
